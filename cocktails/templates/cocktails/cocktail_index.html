{% load static %}
<article class="cocktail-card">
  <a class="cocktail-card__media" href="{% url 'cocktail_details' cocktail.id %}">
    {% if cocktail.image %}
      <img src="{{ cocktail.image.url }}" alt="{{ cocktail.name }}" class="cocktail-card__img">
    {% else %}
      <img src="{% static 'icons/glass-coctail-svgrepo-com.svg' %}" alt="{{ cocktail.name }}" class="cocktail-card__img cocktail-card__img--placeholder">
    {% endif %}
  </a>

  <div class="cocktail-card__body">
    <a class="cocktail-card__title-link" href="{% url 'cocktail_details' cocktail.id %}">
      <h2 class="cocktail-card__title">{{ cocktail.name }}</h2>
    </a>
    <span class="cocktail-card__category">{{ cocktail.category }}</span>
    <p class="cocktail-card__desc">{{ cocktail.description|truncatewords:18 }}</p>
    <a class="cocktail-card__cta" href="{% url 'cocktail_details' cocktail.id %}">Zobacz recepturę →</a>
  </div>

  {% if request.user.is_authenticated %}
    <form method="POST" action="{% url 'toggle-star' cocktail.id %}" class="cocktail-card__star-form">
      {% csrf_token %}
      <button type="submit" class="cocktail-card__star" aria-label="Dodaj do ulubionych">
        <img src="{% static 'icons/starred.svg' %}" alt="">
      </button>
    </form>
  {% endif %}
</article>
